site_name: "Guide Aurora FR 2026"
site_description: "Documentation francophone moderne pour Xbox 360 JTAG/RGH sous Aurora Dashboard"
site_author: "Communauté Xbox 360 FR"
site_url: "https://ElMajoR9.github.io/xbox360-aurora-guide/"
repo_url: "https://github.com/ElMajoR9/xbox360-aurora-guide"
repo_name: "xbox360-aurora-guide"

docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

nav:
  - Accueil: index.md
  - Installation:
    - Aurora Dashboard: installation/aurora.md
    - DashLaunch: installation/dashlaunch.md
    - Réseau & FTP: installation/reseau.md
  - Utilisation:
    - Gestion du contenu: contenu.md
    - Sauvegardes & Profils: saves.md
    - Multijoueur: multijoueur.md
  - Plugins:
    - Installer un plugin: plugins/installation.md
    - Compatibilité: plugins/compatibilite.md
  - Émulation & Homebrew:
    - Émulation: emulation.md
    - Homebrew: homebrew.md
  - Personnalisation:
    - Thèmes Aurora: personnalisation/themes.md
  - Outils PC: outils-pc/index.md
  - Aide:
    - Diagnostic: diagnostic.md
    - FAQ: faq.md
    - Glossaire: glossaire.md
  - Contribuer: contribuer.md

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TON_USERNAME/xbox360-aurora-guide
      name: GitHub
  generator: false

copyright: "Contenu sous licence CC BY-SA 4.0 — Contributions bienvenues"
